services:
  postgres:
    image: postgres:16-alpine
    container_name: dms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distribution
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distribution"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: dms_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      CORS_ORIGINS: "http://localhost:8081,http://localhost:5173"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: distribution
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Kolkata
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /app/uploads
      STORAGE_PUBLIC_URL: /uploads
      SEED_SUPERADMIN_EMAIL: superadmin@company.com
      SEED_SUPERADMIN_PASSWORD: ChangeMe@123
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: dms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pgdata:
  uploads:
