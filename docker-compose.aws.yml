# AWS EC2 — backend + Postgres only (frontend on Vercel).
#
# Setup:
#   cp .env.aws.example .env.aws
#   nano .env.aws
#   docker-compose -f docker-compose.aws.yml up --build -d
#
# If backend keeps restarting, check logs:
#   docker-compose -f docker-compose.aws.yml logs backend --tail 50
#
# If DB password was changed after first run, reset volumes:
#   docker-compose -f docker-compose.aws.yml down -v
#   docker-compose -f docker-compose.aws.yml up --build -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: dms_postgres
    restart: unless-stopped
    env_file:
      - .env.aws
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distribution"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: dms_backend
    restart: unless-stopped
    env_file:
      - .env.aws
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_SSLMODE: disable
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
